name: Build Aura APK

# Jab bhi code push hoga ya manually trigger karoge, build chalega
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # GitHub pe button se manually chalane ke liye

jobs:
  build:
    runs-on: ubuntu-latest   # GitHub ka free cloud computer

    steps:
      # 1. Code download karo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java 17 setup (Android build ke liye)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Android SDK setup (command-line tools, license auto-accept).
      #    Ye compileSdk 34, build-tools sab le aata hai.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 4. Gradle setup (version 8.6 install + cache). Ye 'gradle'
      #    command ko PATH pe daal deta hai, isliye wrapper jar ki
      #    zarurat nahi padti.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      # 5. Debug APK banao (testing ke liye, signing ki zarurat nahi)
      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      # 6. APK ko download ke liye upload karo
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aura-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

